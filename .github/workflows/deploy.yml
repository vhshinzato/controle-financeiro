name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=vhshinzatos-projects
        env:
          VERCEL_ORG_ID: team_7rYFIx4Of2WIkSECuzcubi9i
          VERCEL_PROJECT_ID: prj_klLZhDepvpdBqFiTKVNW8NG9CMIL
